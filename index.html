        <a href="https://t.me/+FdMf_SJE-ONlZWE1" target="_blank" class="tg-btn">PREMIUM HACK</a>
    </div>
</div>

<script>
    // ড্র্যাগিং সিস্টেম
    const dragItem = document.querySelector("#predictionBox");
    let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

    function dragStart(e) {
        let event = e.type === "touchstart" ? e.touches[0] : e;
        initialX = event.clientX - xOffset;
        initialY = event.clientY - yOffset;
        if (e.target === dragItem || dragItem.contains(e.target)) active = true;
    }
    function dragEnd() { initialX = currentX; initialY = currentY; active = false; }
    function drag(e) {
        if (active) {
            e.preventDefault();
            let event = e.type === "touchmove" ? e.touches[0] : e;
            currentX = event.clientX - initialX;
            currentY = event.clientY - initialY;
            xOffset = currentX; yOffset = currentY;
            dragItem.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }

    window.addEventListener("touchstart", dragStart, {passive: false});
    window.addEventListener("touchend", dragEnd, {passive: false});
    window.addEventListener("touchmove", drag, {passive: false});
    window.addEventListener("mousedown", dragStart);
    window.addEventListener("mouseup", dragEnd);
    window.addEventListener("mousemove", drag);

    // পাসওয়ার্ড ভেরিফিকেশন (Pass: 221133)
    function checkKey() {
        const pass = document.getElementById("accessKey").value;
        if(pass === "221133") {
            document.getElementById("loginUI").style.display = "none";
            document.getElementById("predictionUI").style.display = "block";
            updateMarketData();
            startMainEngine();
        } else {
            alert("ভুল পাসওয়ার্ড মামা!");
        }
    }

    function updateMarketData() {
        let now = new Date();
        let year = now.getFullYear();
        let month = (now.getMonth() + 1).toString().padStart(2, '0');
        let day = now.getDate().toString().padStart(2, '0');
        
        // ৩০ সেকেন্ড মার্কেটের লজিক:
        // ১ দিনে মোট ১৪৪০ মিনিট। প্রতি মিনিটে ২টি রাউন্ড।
        // সিরিয়াল নম্বর = (ঘন্টা * ১২০) + (মিনিট * ২) + (সেকেন্ড >= ৩০ হলে ১, না হলে ০) + ১
        let totalMinutes = (now.getHours() * 60) + now.getMinutes();
        let periodSerial = (totalMinutes * 2) + (now.getSeconds() >= 30 ? 2 : 1);
        
        // পিরিয়ড ফরম্যাট: YYYYMMDD + ১০ + ৪ ডিজিটের সিরিয়াল
        let fullPeriod = `${year}${month}${day}01${periodSerial.toString().padStart(4, '0')}`;
        document.getElementById("p_id").innerText = `PERIOD: ${fullPeriod}`;

        // র‍্যান্ডম সিগন্যাল জেনারেশন
        const res = Math.random() > 0.5 ? "BIG" : "SMALL";
        const num = Math.floor(Math.random() * 10);
        const color = (num === 0 || num === 5) ? "VIOLET" : (num % 2 === 0 ? "RED" : "GREEN");
        
        document.getElementById("p_val").innerText = res;
        document.getElementById("p_val").className = "res-val " + res.toLowerCase();
        document.getElementById("p_num_color").innerText = `NUM: ${num} | COLOR: ${color}`;
    }

    function startMainEngine() {
        setInterval(() => {
            let now = new Date();
            let seconds = now.getSeconds();
            let remaining = 30 - (seconds % 30);
            
            document.getElementById("timer").innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
            
            // যখন ৩০ বা ০ সেকেন্ডে পৌঁছাবে, তখন পিরিয়ড আইডি ১ বাড়বে এবং নতুন সিগন্যাল আসবে
            if (remaining === 30) {
                updateMarketData();
            }
        }, 1000);
    }
</script>
